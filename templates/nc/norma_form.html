{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <div class="card">
    <form method="post" novalidate>
      {% csrf_token %}

      <div class="space-y-4">
        <div>
          <label class="form-label">Norma <span class="text-danger">*</span></label>
          <input type="text" name="nombre" value="{{ nombre|default:'' }}" class="form-input" placeholder="Ej: ISO 9001:2015">
        </div>

        <div>
          <label class="form-label">Descripción</label>
          <textarea name="descripcion" class="form-input" rows="3" placeholder="Detalle opcional de la norma...">{{ descripcion|default:'' }}</textarea>
        </div>

        <div>
          <label class="form-label">Puntos de la norma <span class="text-danger">*</span></label>
          <textarea name="puntos" class="form-input font-mono" rows="8" placeholder="Un punto por línea. Ejemplos:&#10;8.7 - Control de las salidas no conformes&#10;7.1.5 - Recursos de seguimiento y medición">{{ puntos|default:'' }}</textarea>
          <p class="mt-1 text-xs text-gray-500">Carga un punto por línea. Puedes usar formato "código - descripción" o solo la descripción.</p>
        </div>

        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="activo" class="form-checkbox" {% if activo %}checked{% endif %}>
          <span class="text-sm font-medium text-gray-700">Norma activa</span>
        </label>
      </div>

      <div class="mt-6 flex items-center gap-3 pt-4 border-t border-gray-100">
        <button type="submit" class="btn-primary">Guardar</button>
        <a href="{% url 'nc:norma_lista' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
