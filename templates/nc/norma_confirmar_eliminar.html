{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="card">
    <h1 class="text-2xl font-bold text-gray-900">Eliminar norma</h1>
    <p class="mt-3 text-sm text-gray-600">Se eliminará lógicamente la norma <strong>{{ norma.nombre }}</strong> y sus puntos dejarán de estar disponibles para nuevas no conformidades.</p>

    <form method="post" class="mt-6 flex items-center gap-3">
      {% csrf_token %}
      <button type="submit" class="btn-danger">Eliminar</button>
      <a href="{% url 'nc:norma_detalle' norma.pk %}" class="btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
