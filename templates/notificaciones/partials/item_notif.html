{# Item individual de notificación — también usado en lista completa #}
<div id="notif-{{ n.pk }}"
     class="flex gap-3 px-4 py-3 hover:bg-gray-50 transition-colors {% if not n.leida %}bg-teal-50/40{% endif %}">
  <div class="shrink-0 mt-1">
    {% if not n.leida %}
    <span class="inline-block w-2 h-2 rounded-full bg-teal-600"></span>
    {% else %}
    <span class="inline-block w-2 h-2 rounded-full bg-gray-200"></span>
    {% endif %}
  </div>
  <div class="min-w-0 flex-1">
    <p class="text-xs font-semibold text-gray-700 leading-snug truncate">{{ n.titulo }}</p>
    <p class="text-xs text-gray-500 leading-snug mt-0.5">{{ n.mensaje|truncatechars:80 }}</p>
    <p class="text-[10px] text-gray-400 mt-1">{{ n.creada_en|timesince }} atrás</p>
  </div>
  <div class="shrink-0 flex flex-col gap-1">
    {% if n.url_destino %}
    <a href="{{ n.url_destino }}" class="text-[10px] text-teal-700 hover:underline">Ver</a>
    {% endif %}
    {% if not n.leida %}
    <form method="post" action="{% url 'notificaciones:marcar_leida' n.pk %}"
          hx-post="{% url 'notificaciones:marcar_leida' n.pk %}"
          hx-target="#notif-{{ n.pk }}"
          hx-swap="outerHTML">
      {% csrf_token %}
      <button type="submit" class="text-[10px] text-gray-400 hover:text-gray-600">✓</button>
    </form>
    {% endif %}
  </div>
</div>
