<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — SGC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#0f766e', hover: '#0d9488' } } } }
    }
  </script>
</head>
<body class="h-full flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#0f2027] mb-4">
        <svg class="w-7 h-7 text-[#0f766e]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">SGC — Gestión de Calidad</h1>
      <p class="text-sm text-gray-500 mt-1">Ingresá con tu cuenta</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      {% if form.errors %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
        Usuario o contraseña incorrectos.
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="mb-4">
          <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1.5">Usuario</label>
          <input id="id_username" name="username" type="text" autocomplete="username" required
                 class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#0f766e] focus:ring-2 focus:ring-[#0f766e]/10 transition-colors">
        </div>

        <div class="mb-6">
          <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
          <input id="id_password" name="password" type="password" autocomplete="current-password" required
                 class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#0f766e] focus:ring-2 focus:ring-[#0f766e]/10 transition-colors">
        </div>

        <button type="submit"
                class="w-full py-2.5 px-4 bg-[#0f766e] hover:bg-[#0d9488] text-white text-sm font-semibold rounded-lg transition-colors">
          Ingresar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
