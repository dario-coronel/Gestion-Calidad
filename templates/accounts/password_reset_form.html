{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — SGC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#0f766e', hover: '#0d9488' } } } }
    }
  </script>
</head>
<body class="h-full flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <img src="{% static 'img/logo_edp.jpg' %}" alt="EDP Agro" class="h-24 mx-auto mb-5 object-contain">
      <h1 class="text-xl font-bold text-gray-900">Recuperar contraseña</h1>
      <p class="text-sm text-gray-500 mt-1">Ingresá tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-6">
          <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1.5">Correo electrónico</label>
          <input id="id_email" name="email" type="email" autocomplete="email" required
                 placeholder="tu-correo@empresa.com"
                 class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#0f766e] focus:ring-2 focus:ring-[#0f766e]/10 transition-colors">
          {% if form.email.errors %}
          <p class="mt-1.5 text-xs text-red-600">{{ form.email.errors.0 }}</p>
          {% endif %}
        </div>

        <button type="submit"
                class="w-full py-2.5 px-4 bg-[#0f766e] hover:bg-[#0d9488] text-white text-sm font-semibold rounded-lg transition-colors">
          Enviar enlace de recuperación
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="{% url 'accounts:login' %}" class="text-[#0f766e] hover:underline">← Volver al inicio de sesión</a>
    </p>
  </div>
</body>
</html>
