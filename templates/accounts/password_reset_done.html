{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correo enviado — SGC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#0f766e', hover: '#0d9488' } } } }
    }
  </script>
</head>
<body class="h-full flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <img src="{% static 'img/logo_edp.jpg' %}" alt="EDP Agro" class="h-24 mx-auto mb-5 object-contain">
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-teal-50 text-[#0f766e] mb-4">
        <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">Revisá tu correo</h1>
      <p class="text-sm text-gray-500 mt-3 leading-6">
        Si la dirección ingresada tiene una cuenta registrada, recibirás un correo con las instrucciones para restablecer tu contraseña en los próximos minutos.
      </p>
      <p class="text-xs text-gray-400 mt-3">Si no ves el correo, revisá la carpeta de spam.</p>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="{% url 'accounts:login' %}" class="text-[#0f766e] hover:underline">← Volver al inicio de sesión</a>
    </p>
  </div>
</body>
</html>
