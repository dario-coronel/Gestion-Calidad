{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña actualizada — SGC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#0f766e', hover: '#0d9488' } } } }
    }
  </script>
</head>
<body class="h-full flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <img src="{% static 'img/logo_edp.jpg' %}" alt="EDP Agro" class="h-24 mx-auto mb-5 object-contain">
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-teal-50 text-[#0f766e] mb-4">
        <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">¡Contraseña actualizada!</h1>
      <p class="text-sm text-gray-500 mt-3 leading-6">
        Tu contraseña fue restablecida correctamente. Ya podés iniciar sesión con tu nueva contraseña.
      </p>
      <a href="{% url 'accounts:login' %}"
         class="mt-6 inline-flex items-center rounded-lg bg-[#0f766e] px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-[#0d9488]">
        Ir al inicio de sesión
      </a>
    </div>

  </div>
</body>
</html>
